<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bat — Echolocation</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="overlay" onclick="
  this.style.display='none';
  document.getElementById('ui').style.display='';
  document.getElementById('crosshair').style.display='';
  document.getElementById('sonar-bar-wrap').style.display='';
  if(typeof gameStarted!=='undefined'){gameStarted=true;}
  var req=document.body.requestPointerLock&&document.body.requestPointerLock();
  if(req&&req.catch)req.catch(function(){});
">
  <h1>Bat</h1>
  <p>WASD — Fly</p>
  <p>MOUSE — Look</p>
  <p>Q / SPACE — Up &nbsp;&nbsp; E / CTRL — Down</p>
  <p>CLICK — Emit Sonar Pulse</p>
  <p class="hazard">Red props — lethal &nbsp;·&nbsp; Blue props — safe bumpers</p>
  <p class="go">[ CLICK ANYWHERE TO BEGIN ]</p>
</div>

<div id="gameover" style="display:none" aria-live="polite">
  <h2>GAME OVER</h2>
  <p class="reason">You struck a lethal red obstacle.</p>
  <button type="button" id="restart-btn">Play again</button>
</div>

<p id="model-credit">Bat 3D model: Dzimge (CC-BY-4.0) · Sketchfab</p>

<div id="ui" style="display:none"></div>
<div id="crosshair" style="display:none"></div>

<div id="sonar-bar-wrap" style="display:none">
  <div id="sonar-label">SONAR</div>
  <div id="sonar-bar"><div id="sonar-fill"></div></div>
</div>

<div id="wing-left"></div>
<div id="wing-right"></div>
<div id="flash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="script.js"></script>

</body>
</html>
